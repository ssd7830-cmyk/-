<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>하미 브레이커</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body {
    height:100%; background:#1b1410; overflow:hidden;
    font-family:-apple-system,'Segoe UI',Roboto,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    display:flex; align-items:center; justify-content:center;
    user-select:none; touch-action:none;
  }
  #wrap {
    position:relative; height:100vh; aspect-ratio:540/960; max-width:100vw;
    box-shadow:0 0 60px rgba(0,0,0,.6);
  }
  canvas { display:block; width:100%; height:100%; background:#fff8e1; border-radius:2px; }
  #overlay {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px;
    background:rgba(27,20,16,.78); color:#fff; text-align:center;
    opacity:0; pointer-events:none; transition:opacity .25s;
  }
  #overlay.show { opacity:1; pointer-events:auto; }
  #mute {
    position:absolute; top:10px; right:10px; z-index:5;
    width:42px; height:42px; border:none; border-radius:50%;
    background:rgba(255,255,255,.6); font-size:20px; cursor:pointer; line-height:42px;
  }
  #mute:active { transform:scale(.92); }
  #speed {
    position:absolute; top:10px; right:60px; z-index:5;
    height:42px; padding:0 12px; border:none; border-radius:21px;
    background:rgba(255,255,255,.6); font-size:15px; font-weight:800; color:#5d2c00;
    cursor:pointer; line-height:42px;
  }
  #speed.on { background:#ff9800; color:#fff; }
  #speed:active { transform:scale(.92); }
  #overlay h1 { font-size:clamp(28px,7vw,46px); color:#ffb300; letter-spacing:1px; }
  #overlay p  { font-size:clamp(15px,3.6vw,20px); line-height:1.6; opacity:.9; }
  #overlay .big { font-size:clamp(34px,9vw,60px); color:#ff9800; font-weight:800; }
  #btn {
    margin-top:6px; padding:14px 40px; font-size:clamp(18px,4.4vw,24px); font-weight:700;
    color:#fff; background:#ff9800; border:none; border-radius:40px; cursor:pointer;
    box-shadow:0 6px 0 #e07b00; transition:transform .05s;
  }
  #btn:active { transform:translateY(4px); box-shadow:0 2px 0 #e07b00; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="cv" width="540" height="960"></canvas>
  <button id="speed" aria-label="배속">1×</button>
  <button id="mute" aria-label="소리 켜기/끄기">🔊</button>
  <div id="overlay" class="show">
    <h1 id="ttl">🌾 하미 브레이커</h1>
    <p id="sub">아래에서 위로 <b>드래그</b>해서 하미를 쏴!<br>벽돌 숫자만큼 맞히면 깨져.<br>벽돌이 빨간 선에 닿으면 끝.</p>
    <div id="scoreLine" style="display:none"></div>
    <button id="btn">시작</button>
  </div>
</div>

const COLW=(CFG.W-CFG.GAP*(CFG.COLS+1))/CFG.COLS;
const ROWH=46;   // 벽돌 높이(얇게, 스와이프 벽돌깨기 느낌)
const colX=c=>CFG.GAP+c*(COLW+CFG.GAP);
const rowY=r=>CFG.TOP+r*(ROWH+CFG.GAP);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));

// ---- 테마 ----
const THEME = {
  bg:'#fff8e1',
  brick1:'#ffcc80', brick2:'#ffa726', brick3:'#fb8c00', bomb:'#ef5350',
  brickEdge:'#e65100', text:'#5d2c00',
  pickup:'#66bb6a', dead:'#e53935',
};

// ---- 사운드 (Web Audio, 합성) ----
const SND = {
  ctx:null, muted:false, noise:null, lastHit:0,
  init(){
    if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(this.ctx&&!this.noise){ const n=Math.floor(this.ctx.sampleRate*0.3);
      const buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate), d=buf.getChannelData(0);
      for(let i=0;i<n;i++) d[i]=Math.random()*2-1; this.noise=buf; }
    if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume();
  },
  // 필터된 노이즈 = 퍼커시브 "톡/퍽"
  pop(freq,dur,vol,q){
    if(this.muted||!this.ctx||!this.noise) return;
    const t=this.ctx.currentTime;
    const s=this.ctx.createBufferSource(); s.buffer=this.noise;
    const bp=this.ctx.createBiquadFilter(); bp.type='bandpass';
    bp.frequency.setValueAtTime(freq,t); bp.frequency.exponentialRampToValueAtTime(Math.max(80,freq*0.45),t+dur);
    bp.Q.value=q||4;
    const g=this.ctx.createGain(); g.gain.setValueAtTime(vol||0.3,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.connect(bp); bp.connect(g); g.connect(this.ctx.destination); s.start(t); s.stop(t+dur);
  },
  // 부드러운 톤 (코인/팡파레)
  beep(freq,dur,vol,type){
    if(this.muted||!this.ctx) return;
    const t=this.ctx.currentTime;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(vol||0.2,t+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(this.ctx.destination); o.start(t); o.stop(t+dur);
  },
  hit(){ if(!this.ctx)return; if(this.ctx.currentTime-this.lastHit<0.018)return; this.lastHit=this.ctx.currentTime; this.pop(950,0.045,0.10,2); },
  brk(combo){ this.pop(420+Math.min(900,(combo||1)*55),0.11,0.32,3); },
  pick(){ this.beep(880,0.10,0.18,'sine'); setTimeout(()=>this.beep(1320,0.13,0.16,'sine'),55); },
  shoot(){ this.pop(280,0.06,0.09,1); },
  bulk(){ this.pop(150,0.5,0.4,1.4); this.beep(220,0.45,0.18,'sawtooth'); setTimeout(()=>this.beep(440,0.4,0.16,'square'),130); },
  clear(){ [660,880,1100,1320].forEach((f,i)=>setTimeout(()=>this.beep(f,0.25,0.18,'sine'),i*100)); },
  over(){ this.beep(330,0.45,0.2,'sine'); setTimeout(()=>this.beep(196,0.6,0.2,'sine'),120); },
  win(){ [523,659,784,1047,1319,1568].forEach((f,i)=>setTimeout(()=>this.beep(f,0.28,0.18,'triangle'),i*140)); },
};

// ---- DOM ----
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const overlay=document.getElementById('overlay');
const btn=document.getElementById('btn');
const ttl=document.getElementById('ttl');
const sub=document.getElementById('sub');
const scoreLine=document.getElementById('scoreLine');

// ---- 하미 이미지 ----
const HAMI_IMG=new Image();
let hamiReady=false;
HAMI_IMG.onload=()=>{ hamiReady=true; };
HAMI_IMG.src=window.__HAMI_SRC__||'';

// ---- 게임 상태 ----
let game=null;
let gameSpeed=1;   // 1× / 1.5× 토글
function newGame(){
  return { state:'menu', stage:1, ballCount:1, score:0,
           best:+(localStorage.getItem('hami_best')||0),
           balls:[], bricks:[], pickups:[], particles:[], popups:[],
           launchX:CFG.W/2, aim:null, fireDir:null, fireQueue:0, fireTimer:0,
           turnTime:0, nextLaunchX:null, turnsUsed:0, par:1,
           combo:0, maxCombo:0, slowDone:false,
           bulk:false, bulkedThisTurn:false, bulkCutin:0,
           shake:0, hitstop:0, timeScale:1 };
}

// 맨 윗줄(row 0) 새로 생성 — 벽돌 숫자(HP) = 현재 스테이지
function spawnTopRow(g){
  const hp=g.stage;
  let placed=0;
  for(let c=0;c<CFG.COLS;c++){
    if(Math.random()<CFG.ROW_FILL){
      g.bricks.push({col:c,row:0,hp,maxHp:hp,type:'normal',shake:0,dead:false});
      placed++;
    }
  }
  if(placed===0){ const c=Math.floor(Math.random()*CFG.COLS);
    g.bricks.push({col:c,row:0,hp,maxHp:hp,type:'normal',shake:0,dead:false}); }
  // 매 줄마다 하미 픽업 1개 무조건 (+1, 가끔 +2)
  let empties=[];
  for(let c=0;c<CFG.COLS;c++) if(!g.bricks.some(b=>b.row===0&&b.col===c)) empties.push(c);
  if(empties.length===0){ const c=Math.floor(Math.random()*CFG.COLS);
    g.bricks=g.bricks.filter(b=>!(b.row===0&&b.col===c)); empties=[c]; }
  const c=empties[Math.floor(Math.random()*empties.length)];
  g.pickups.push({col:c,row:0,taken:false,amount:Math.random()<0.25?2:1});
}

function startRun(){
  if(!game) game=newGame();
  const g=game;
  g.stage=1; g.ballCount=1; g.score=1;
  g.balls=[]; g.bricks=[]; g.pickups=[]; g.particles=[]; g.popups=[];
  g.aim=null; g.nextLaunchX=null; g.fireQueue=0; g.turnTime=0;
  g.combo=0; g.maxCombo=0; g.slowDone=false;
  g.bulk=false; g.bulkedThisTurn=false; g.bulkCutin=0;
  g.shake=0; g.hitstop=0; g.timeScale=1; g.launchX=CFG.W/2;
  // 시작 시 3줄 (전부 stage1 → 숫자 1)
  for(let i=0;i<3;i++){ for(const b of g.bricks) b.row++; for(const p of g.pickups) p.row++; spawnTopRow(g); }
  // 1스테이지 +2 보장
  if(!g.pickups.some(p=>p.amount>=2)){
    if(g.pickups.length) g.pickups[0].amount=2;
    else { outer: for(let r=0;r<4;r++) for(let c=0;c<CFG.COLS;c++)
      if(!g.bricks.some(b=>b.row===r&&b.col===c)){ g.pickups.push({col:c,row:r,taken:false,amount:2}); break outer; } }
  }
  g.state='aiming';
  hideOverlay();
}

// ---- 입력 ----
function canvasPos(evt){
  const rect=cv.getBoundingClientRect();
  const src=evt.touches?evt.touches[0]:(evt.changedTouches?evt.changedTouches[0]:evt);
  return { x:(src.clientX-rect.left)/rect.width*CFG.W, y:(src.clientY-rect.top)/rect.height*CFG.H };
}
let dragging=false;
function onDown(e){ if(!game||game.state!=='aiming')return; e.preventDefault();
  const p=canvasPos(e); if(p.y<CFG.TOP)return; dragging=true; game.aim=p; }
function onMove(e){ if(!dragging||!game)return; e.preventDefault(); game.aim=canvasPos(e); }
function onUp(e){ if(!dragging||!game)return; e.preventDefault(); dragging=false;
  const dir=aimDir(game); game.aim=null; if(!dir)return; launch(game,dir); }
function aimDir(g){ if(!g.aim)return null;
  let dx=g.aim.x-g.launchX, dy=g.aim.y-CFG.LAUNCH_Y; const len=Math.hypot(dx,dy);
  if(len<8)return null; dx/=len; dy/=len; if(dy>-0.12)return null; return {x:dx,y:dy}; }
function launch(g,dir){ SND.shoot(); g.state='shooting'; g.fireQueue=g.ballCount; g.fireTimer=0;
  g.fireDir=dir; g.turnTime=0; g.nextLaunchX=null; g.turnsUsed++;
  g.combo=0; g.bulkedThisTurn=false; g.bulk=false; g.slowDone=false; }
cv.addEventListener('mousedown',onDown);
cv.addEventListener('mousemove',onMove);
window.addEventListener('mouseup',onUp);
cv.addEventListener('touchstart',onDown,{passive:false});
cv.addEventListener('touchmove',onMove,{passive:false});
window.addEventListener('touchend',onUp,{passive:false});

// ---- 물리 ----
function brickRect(b){ return {x:colX(b.col),y:rowY(b.row),w:COLW,h:ROWH}; }
function circleBrick(x,y,R,b){ const r=brickRect(b);
  const cx=clamp(x,r.x,r.x+r.w), cy=clamp(y,r.y,r.y+r.h);
  return (x-cx)*(x-cx)+(y-cy)*(y-cy)<=R*R; }
function reflectOff(ball,b,R){ const r=brickRect(b);
  const cx=clamp(ball.x,r.x,r.x+r.w), cy=clamp(ball.y,r.y,r.y+r.h);
  let nx=ball.x-cx, ny=ball.y-cy, d2=nx*nx+ny*ny;
  if(d2<1e-6){ const L=ball.x-r.x,Rr=r.x+r.w-ball.x,T=ball.y-r.y,B=r.y+r.h-ball.y,m=Math.min(L,Rr,T,B);
    if(m===L){ball.x=r.x-R;ball.vx=-Math.abs(ball.vx);} else if(m===Rr){ball.x=r.x+r.w+R;ball.vx=Math.abs(ball.vx);}
    else if(m===T){ball.y=r.y-R;ball.vy=-Math.abs(ball.vy);} else {ball.y=r.y+r.h+R;ball.vy=Math.abs(ball.vy);} }
  else { const d=Math.sqrt(d2); nx/=d; ny/=d; const dot=ball.vx*nx+ball.vy*ny;
    ball.vx-=2*dot*nx; ball.vy-=2*dot*ny; const push=R-d; ball.x+=nx*push; ball.y+=ny*push; } }

function fireOne(g){ g.balls.push({x:g.launchX,y:CFG.LAUNCH_Y,vx:g.fireDir.x*CFG.BALL_SPEED,vy:g.fireDir.y*CFG.BALL_SPEED,active:true,trail:[]}); }

function stepBall(g,ball,dt){
  const R=g.bulk?CFG.BALL_R*CFG.BULK_R:CFG.BALL_R;
  const dist=Math.hypot(ball.vx,ball.vy)*dt;
  const steps=Math.max(1,Math.ceil(dist/(R*0.8)));
  const h=dt/steps;
  for(let s=0;s<steps&&ball.active;s++){
    ball.x+=ball.vx*h; ball.y+=ball.vy*h;
    if(ball.x<R){ball.x=R;ball.vx=Math.abs(ball.vx);}
    if(ball.x>CFG.W-R){ball.x=CFG.W-R;ball.vx=-Math.abs(ball.vx);}
    if(ball.y<R){ball.y=R;ball.vy=Math.abs(ball.vy);}
    if(ball.y>CFG.LAUNCH_Y){ ball.active=false; if(g.nextLaunchX===null)g.nextLaunchX=ball.x; return; }
    for(const b of g.bricks){ if(b.dead)continue;
      if(circleBrick(ball.x,ball.y,R,b)){
        reflectOff(ball,b,R); damageBrick(g,b,g.bulk?2:1,ball.x,ball.y);  // 벌크=2데미지(튕김 유지)
        break;
      }
    }
    for(const p of g.pickups){ if(p.taken)continue;
      const px=colX(p.col)+COLW/2, py=rowY(p.row)+ROWH/2;
      if(Math.hypot(ball.x-px,ball.y-py)<R+16){ p.taken=true; g.ballCount+=(p.amount||1);
        spawnPick(g,px,py); addPopup(g,px,py,'+'+(p.amount||1),p.amount>=2?'#1b5e20':'#2e7d32',p.amount>=2?28:20); }
    }
    if(!g.bulk && Math.abs(ball.vy)<CFG.MIN_VY){ ball.vy=(ball.vy<0?-1:1)*CFG.MIN_VY;
      const k=Math.sqrt(Math.max(0,CFG.BALL_SPEED*CFG.BALL_SPEED-ball.vy*ball.vy)); ball.vx=(ball.vx<0?-1:1)*k; }
  }
}

function damageBrick(g,b,dmg,hx,hy){
  b.hp-=dmg; b.shake=1; spawnHit(g,hx,hy);
  if(b.hp<=0&&!b.dead){
    b.dead=true; g.combo++; if(g.combo>g.maxCombo)g.maxCombo=g.combo;
    g.score+=1+Math.floor(g.combo/3);
    spawnPop(g,colX(b.col)+COLW/2,rowY(b.row)+ROWH/2,b.type==='bomb');
    SND.brk(g.combo);
    g.shake=Math.min(15,g.shake+(b.type==='bomb'?9:2.4));
    if(g.combo>=3) addPopup(g,colX(b.col)+COLW/2,rowY(b.row)+ROWH/2-8,'x'+g.combo,comboColor(g.combo),16+Math.min(22,g.combo));
    if(b.type==='bomb') explode(g,b);
    if(!g.bulkedThisTurn && g.combo>=CFG.BULK_COMBO) triggerBulk(g);
    // 마지막 한 개 슬로우모
    if(!g.slowDone && g.bricks.filter(x=>!x.dead).length===1){ g.timeScale=0.35; g.slowDone=true; }
  }
}
function explode(g,b){
  g.hitstop=Math.max(g.hitstop,0.04); g.shake=Math.min(18,g.shake+6);
  for(const o of g.bricks){ if(o.dead)continue;
    if(Math.abs(o.col-b.col)<=1&&Math.abs(o.row-b.row)<=1) damageBrick(g,o,999,colX(o.col)+COLW/2,rowY(o.row)+ROWH/2); }
}
function triggerBulk(g){ g.bulk=true; g.bulkedThisTurn=true; g.bulkCutin=2.0;  // 2초 프리즈
  g.timeScale=1; g.shake=0; SND.bulk(); }

// ---- 파티클 / 팝업 ----
function part(x,y,c,s){ const a=Math.random()*6.28, v=60+Math.random()*200;
  return {x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-50,life:0.5,c,s:s+Math.random()*2}; }
function spawnHit(g,x,y){ SND.hit(); for(let i=0;i<3;i++) g.particles.push(part(x,y,'#ffb300',2)); }
function spawnPop(g,x,y,big){ const n=big?22:11, col=big?'#ef5350':'#fb8c00';
  for(let i=0;i<n;i++) g.particles.push(part(x,y,col,big?4:3)); }
function spawnPick(g,x,y){ for(let i=0;i<10;i++) g.particles.push(part(x,y,THEME.pickup,3)); }
function addPopup(g,x,y,text,color,size){ g.popups.push({x,y,text,color,size,vy:-70,life:0.9}); }
function comboColor(c){ return c<6?'#ff9800':c<10?'#f4511e':c<16?'#d500f9':'#aa00ff'; }

// ---- 턴 종료 / 스테이지 흐름 ----
function endTurn(g){
  if(g.nextLaunchX!==null) g.launchX=clamp(g.nextLaunchX,COLW*0.3,CFG.W-COLW*0.3);
  g.bricks=g.bricks.filter(b=>!b.dead);
  g.pickups=g.pickups.filter(p=>!p.taken);
  g.bulk=false; g.bulkedThisTurn=false; g.combo=0;
  // 한 칸 내림
  for(const b of g.bricks) b.row++;
  for(const p of g.pickups) p.row++;
  // 데드라인 닿으면 게임오버
  if(g.bricks.some(b=>rowY(b.row)+ROWH>=CFG.DEADLINE)){ gameOver(g); return; }
  // 다음 스테이지: 새 윗줄(숫자=스테이지) + 하미 픽업 같이 내려옴
  g.stage++; g.score=g.stage;
  if(g.stage>g.best){ g.best=g.stage; localStorage.setItem('hami_best',g.best); }
  spawnTopRow(g);
  g.state='aiming';
}
function emitResult(g){
  console.log('[HAMI_RESULT]',JSON.stringify({stage:g.stage,score:g.score,balls:g.ballCount}));
}
function gameOver(g){
  g.state='over'; SND.over(); emitResult(g);
  showOverlay('게임 오버',
    `<div class="big">STAGE ${g.stage}</div><p>최고 ${g.best} · 하미 ${g.ballCount}마리</p>`,
    '다시', ()=>{ startRun(); });
}

// ---- 궤적 예측 ----
function predictPath(g,dir){
  let x=g.launchX,y=CFG.LAUNCH_Y,vx=dir.x*CFG.BALL_SPEED,vy=dir.y*CFG.BALL_SPEED;
  const R=CFG.BALL_R, dtp=1/120, pts=[{x,y}]; let bounces=0;
  for(let i=0;i<1000;i++){
    x+=vx*dtp; y+=vy*dtp;
    if(x<R){x=R;vx=-vx;bounces++;} if(x>CFG.W-R){x=CFG.W-R;vx=-vx;bounces++;}
    if(y<R){y=R;vy=-vy;bounces++;}
    let hit=false;
    for(const b of g.bricks){ if(b.dead)continue; if(circleBrick(x,y,R,b)){hit=true;break;} }
    if(i%4===0) pts.push({x,y});
    if(hit){ pts.push({x,y}); break; }
    if(y>CFG.LAUNCH_Y||bounces>3) break;
  }
  return pts;
}

// ---- 업데이트 ----
function update(dt){
  const g=game; if(!g) return;
  if(g.bulkCutin>0) g.bulkCutin-=dt;        // 컷인은 실시간
  if(g.shake>0) g.shake=Math.max(0,g.shake-dt*55);
  g.timeScale+=(1-g.timeScale)*Math.min(1,dt*3.5);
  if(g.bulkCutin>0){ /* 벌크업 컷인 동안 화면 정지 */ }
  else if(g.hitstop>0){ g.hitstop-=dt; }
  else if(g.state==='shooting'){ stepShooting(g,dt*g.timeScale*gameSpeed); }
  for(const p of g.particles){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=620*dt; p.life-=dt; }
  g.particles=g.particles.filter(p=>p.life>0);
  for(const p of g.popups){ p.y+=p.vy*dt; p.vy*=0.92; p.life-=dt; }
  g.popups=g.popups.filter(p=>p.life>0);
  for(const b of g.bricks) if(b.shake>0) b.shake=Math.max(0,b.shake-dt*6);
}
function stepShooting(g,dt){
  g.turnTime+=dt;
  if(g.fireQueue>0){ g.fireTimer-=dt; while(g.fireQueue>0&&g.fireTimer<=0){ fireOne(g); g.fireQueue--; g.fireTimer+=CFG.FIRE_GAP; } }
  for(const b of g.balls) if(b.active){ stepBall(g,b,dt);
    if(b.active){ b.trail.push({x:b.x,y:b.y}); if(b.trail.length>20) b.trail.shift(); } }
  if(g.turnTime>CFG.TURN_TIMEOUT){ for(const b of g.balls) if(b.active){ if(g.nextLaunchX===null)g.nextLaunchX=b.x; b.active=false; } }
  g.balls=g.balls.filter(b=>b.active);
  if(g.fireQueue===0&&g.balls.length===0) endTurn(g);
}

// ---- 렌더 ----
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

function render(){
  const g=game;
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,CFG.W,CFG.H);
  ctx.fillStyle=THEME.bg; ctx.fillRect(0,0,CFG.W,CFG.H);
  ctx.save();
  if(g&&g.shake>0) ctx.translate((Math.random()-0.5)*g.shake,(Math.random()-0.5)*g.shake);

  // 데드라인
  ctx.strokeStyle=THEME.dead; ctx.lineWidth=3; ctx.setLineDash([10,8]);
  ctx.beginPath(); ctx.moveTo(0,CFG.DEADLINE); ctx.lineTo(CFG.W,CFG.DEADLINE); ctx.stroke();
  ctx.setLineDash([]);

  if(g){
    // 벽돌
    for(const b of g.bricks){ if(b.dead)continue;
      const r=brickRect(b), sx=b.shake>0?(Math.random()-0.5)*4*b.shake:0;
      if(b.type==='bomb'){ ctx.fillStyle=THEME.bomb; } else { const t=b.hp/Math.max(1,b.maxHp);
        ctx.fillStyle=t>0.66?THEME.brick3:t>0.33?THEME.brick2:THEME.brick1; }
      ctx.strokeStyle=THEME.brickEdge; ctx.lineWidth=2;
      roundRect(r.x+sx,r.y,r.w,r.h,8); ctx.fill(); ctx.stroke();
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      if(b.type==='bomb'){ ctx.font=`${Math.floor(r.h*0.5)}px sans-serif`; ctx.fillText('💣',r.x+r.w/2+sx,r.y+r.h/2+2); }
      else { ctx.font=`bold ${Math.floor(r.h*0.4)}px sans-serif`; ctx.fillText(b.hp,r.x+r.w/2+sx,r.y+r.h/2+2); }
    }
    // 픽업
    for(const p of g.pickups){ if(p.taken)continue;
      const px=colX(p.col)+COLW/2, py=rowY(p.row)+ROWH/2, amt=p.amount||1;
      ctx.fillStyle=THEME.pickup; ctx.globalAlpha=0.22; ctx.beginPath(); ctx.arc(px,py,20,0,6.2832); ctx.fill(); ctx.globalAlpha=1;
      drawHami(px,py,11);
      ctx.fillStyle=amt>=2?'#1b5e20':'#2e7d32'; ctx.font=`bold ${amt>=2?16:13}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('+'+amt,px,py+24);
    }
    // 파티클
    for(const p of g.particles){ ctx.globalAlpha=Math.max(0,p.life*2); ctx.fillStyle=p.c;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,6.2832); ctx.fill(); }
    ctx.globalAlpha=1;
    // 궤적 예측
    if(dragging){ const dir=aimDir(g); if(dir){ const pts=predictPath(g,dir);
      for(let i=0;i<pts.length;i++){ const a=1-i/pts.length; ctx.globalAlpha=0.2+0.6*a;
        ctx.fillStyle='#ff9800'; ctx.beginPath(); ctx.arc(pts[i].x,pts[i].y,4,0,6.2832); ctx.fill(); }
      ctx.globalAlpha=1; const last=pts[pts.length-1];
      ctx.strokeStyle='rgba(229,57,53,.9)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(last.x,last.y,11,0,6.2832); ctx.stroke();
    }}
    // 공 트레일(잔상) → 역동적
    const br=g.bulk?CFG.BALL_R*CFG.BULK_R:CFG.BALL_R;
    ctx.lineCap='round';
    for(const b of g.balls){ const tr=b.trail; if(!tr||tr.length<2)continue;
      for(let i=1;i<tr.length;i++){ const a=i/tr.length;
        ctx.strokeStyle=g.bulk?`rgba(213,0,249,${a*0.28})`:`rgba(255,140,0,${a*0.22})`;
        ctx.lineWidth=br*1.6*a;
        ctx.beginPath(); ctx.moveTo(tr[i-1].x,tr[i-1].y); ctx.lineTo(tr[i].x,tr[i].y); ctx.stroke();
      }
    }
    // 공
    for(const b of g.balls) drawHami(b.x,b.y,br);
    // 발사대 하미
    if(g.state==='aiming') drawHami(g.launchX,CFG.LAUNCH_Y,13);
    // 콤보 큰 숫자
    if(g.state==='shooting'&&g.combo>=4){
      ctx.fillStyle=comboColor(g.combo); ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font=`900 ${36+Math.min(40,g.combo*1.6)}px sans-serif`;
      ctx.globalAlpha=0.9; ctx.fillText('x'+g.combo,CFG.W/2,170); ctx.globalAlpha=1;
    }
    // 벌크업 게이지 (콤보 → 벌크 진행도)
    if(g.state==='shooting'&&!g.bulkedThisTurn&&g.combo>0){
      const prog=Math.min(1,g.combo/CFG.BULK_COMBO), gw=200, gx=(CFG.W-gw)/2, gy=200;
      ctx.fillStyle='rgba(0,0,0,.12)'; roundRect(gx,gy,gw,14,7); ctx.fill();
      ctx.fillStyle=prog>=1?'#d500f9':'#ff9800'; roundRect(gx,gy,gw*prog,14,7); ctx.fill();
      ctx.fillStyle='#5d2c00'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(prog>=1?'벌크업 READY!':('벌크업까지 '+g.combo+'/'+CFG.BULK_COMBO),CFG.W/2,gy+26);
    }
    // 팝업
    for(const p of g.popups){ ctx.globalAlpha=Math.max(0,Math.min(1,p.life*1.6));
      ctx.fillStyle=p.color; ctx.font=`900 ${p.size}px sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.text,p.x,p.y); }
    ctx.globalAlpha=1;
  }
  ctx.restore();

  // HUD (흔들림 영향 X)
  if(g){
    ctx.fillStyle=THEME.text; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.font='bold 32px sans-serif'; ctx.fillText('STAGE '+g.stage,16,50);
    ctx.font='bold 15px sans-serif'; ctx.fillStyle='#a1887f';
    ctx.fillText('최고 '+g.best,16,72);
    ctx.textAlign='right'; ctx.font='bold 24px sans-serif'; ctx.fillStyle='#2e7d32';
    ctx.fillText('🌾 x'+g.ballCount,CFG.W-16,50);
  }

  // 벌크업 컷인 (화면 전체 정지, 2초)
  if(g&&g.bulkCutin>0){
    const D=2.0, el=D-g.bulkCutin;                 // 경과시간
    const outA = g.bulkCutin<0.35 ? g.bulkCutin/0.35 : 1;   // 끝 0.35초 페이드아웃
    const pop = Math.min(1, el/0.16);
    const scale = pop<1 ? pop : 1+Math.sin((el-0.16)*10)*0.025*Math.max(0,1-(el-0.16)*2.5);
    ctx.save();
    ctx.globalAlpha=0.84*outA; ctx.fillStyle='#ff6f00'; ctx.fillRect(0,0,CFG.W,CFG.H);
    ctx.globalAlpha=outA;
    if(hamiReady){ const h=CFG.H*0.46*scale, w=h*HAMI_AR; ctx.drawImage(HAMI_IMG,CFG.W/2-w/2,CFG.H*0.42-h/2,w,h); }
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.lineWidth=8; ctx.strokeStyle='#bf360c'; ctx.fillStyle='#fff';
    ctx.font='900 58px sans-serif';
    ctx.strokeText('씨발',CFG.W/2,CFG.H*0.74); ctx.fillText('씨발',CFG.W/2,CFG.H*0.74);
    ctx.font='900 62px sans-serif';
    ctx.strokeText('하미 벌크업!',CFG.W/2,CFG.H*0.82); ctx.fillText('하미 벌크업!',CFG.W/2,CFG.H*0.82);
    ctx.restore();
  }
}

// ---- 루프 ----
let last=0;
function loop(now){ let dt=(now-last)/1000; last=now; if(!isFinite(dt)||dt>0.05)dt=0.05;
  update(dt); render(); requestAnimationFrame(loop); }

// ---- 오버레이 / 버튼 ----
let overlayAction=startRun;
function showOverlay(title,html,label,action){
  ttl.innerHTML=title; sub.style.display='none';
  scoreLine.style.display='block'; scoreLine.innerHTML=html;
  btn.textContent=label; overlayAction=action; overlay.classList.add('show');
}
function hideOverlay(){ overlay.classList.remove('show'); }
btn.addEventListener('click',()=>{ SND.init(); if(overlayAction) overlayAction(); });

const muteBtn=document.getElementById('mute');
muteBtn.addEventListener('click',()=>{ SND.init(); SND.muted=!SND.muted; muteBtn.textContent=SND.muted?'🔇':'🔊'; });

const speedBtn=document.getElementById('speed');
speedBtn.addEventListener('click',()=>{ gameSpeed=gameSpeed===1?1.5:1;
  speedBtn.textContent=gameSpeed===1.5?'1.5×':'1×'; speedBtn.classList.toggle('on',gameSpeed===1.5); });

game=newGame();
requestAnimationFrame(loop);

</script>
